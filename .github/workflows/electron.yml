name: Build Electron App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ui/package-lock.json'

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Build Electron
        working-directory: ui
        run: npm run electron-builder -- --win --mac --linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: ui/dist/*
          retention-days: 30
